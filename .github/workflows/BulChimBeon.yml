name: BulChimBeon

on:
  schedule:
    # 매주 월요일, 목요일 00:00 UTC (KST 09:00)
    #- cron: "0 0 * * 1,4"
    - cron: "15 * * * *"
  # 수동 실행용 트리거 (테스트 시 편리)
  workflow_dispatch:

jobs:
  run-bulchimbeon:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run BulChimBeon script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_TABLE: ${{ secrets.SUPABASE_TABLE }}
          # 다중 프로젝트: JSON 배열로 설정 시 위 단일 설정보다 우선합니다.
          # 예: [{"url":"https://a.supabase.co","secret_key":"sb_secret_..."},{"url":"https://b.supabase.co","secret_key":"sb_secret_..."}]
          SUPABASE_PROJECTS: ${{ secrets.SUPABASE_PROJECTS }}
        run: python BulChimBeon.py

